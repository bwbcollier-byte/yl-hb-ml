name: ADB Artist Enrichment

on:
  schedule:
    # Run daily at 3 AM UTC (1 hour after Spotify enrichment)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual triggers
    inputs:
      limit:
        description: 'Limit number of records (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  enrich:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run ADB enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          AUDIODB_API_KEY: ${{ secrets.AUDIODB_API_KEY }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          if [ -z "$LIMIT" ]; then
            echo "Processing all pending artists..."
            node dist/adb-artist-enrichment.js <<< ""
          else
            echo "Processing $LIMIT artists..."
            node dist/adb-artist-enrichment.js <<< "$LIMIT"
          fi

      - name: Report status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ ADB enrichment completed successfully"
          else
            echo "❌ ADB enrichment failed"
          fi
