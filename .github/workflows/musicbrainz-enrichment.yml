name: MusicBrainz Full Enrichment

on:
  schedule:
    # Run daily at 4 AM UTC (after Spotify at 2 AM and ADB at 3 AM)
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit number of records (leave empty for all)'
        required: false
        default: ''

jobs:
  enrich:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Run enrichment
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AUDIODB_API_KEY: ${{ secrets.AUDIODB_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_ID: ${{ secrets.AIRTABLE_TABLE_ID }}
          AIRTABLE_VIEW_NAME: ${{ secrets.AIRTABLE_VIEW_NAME || 'Musicbrainz' }}
          ALBUMS_BASE_ID: ${{ secrets.ALBUMS_BASE_ID }}
          ALBUMS_TABLE_ID: ${{ secrets.ALBUMS_TABLE_ID }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: node dist/musicbrainz-artist-enrichment.js
      
      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: enrichment-logs
          path: |
            *.log
          retention-days: 7
