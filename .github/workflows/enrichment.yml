name: Spotify Artist Enrichment

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual triggers
    inputs:
      record_limit:
        description: "Number of artists to process (leave empty for all)"
        required: false
        default: ""
        type: string

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # Just under 6-hour GitHub limit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          LIMIT: ${{ github.event.inputs.record_limit }}
          CI: "true"
        run: node dist/index.js

      - name: Report status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Enrichment completed successfully"
          else
            echo "❌ Enrichment failed"
          fi
