name: Musiclinks Artist Enrichment

on:
  schedule:
    - cron: "0 18 * * *" # Run daily at 6 PM UTC (roughly midnight/overnight depending on timezone)
  workflow_dispatch: # Allow manual trigger

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run Enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
        run: npx ts-node src/enrich-social-links.ts
