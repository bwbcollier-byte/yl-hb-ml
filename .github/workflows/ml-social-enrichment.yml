name: Music Links Social Enrichment

on:
  schedule:
    - cron: "0 5 * * *" # Daily at 5 AM UTC
  workflow_dispatch:
    inputs:
      record_limit:
        description: "Number of records to process (leave empty for all)"
        required: false
        default: ""
        type: string

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run Social Enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RAPIDAPI_KEY_1: ${{ secrets.RAPID_API_KEY }}
          LIMIT: ${{ github.event.inputs.record_limit }}
          CI: "true"
        run: node dist/ml-social-enrichment.js
